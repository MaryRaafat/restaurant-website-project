<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/log_style.css">
    <title>Login</title>
</head>
<body class="bg-dark">
<!-- Start Section login -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card" style="background-image: linear-gradient(to left , #FFB30E , #F17228);">
                    <div class="card-header bg-dark text-white">
                        <h4 class="card-title text-center mb-0">Login</h4>
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email address</label>
                                <input type="email" class="form-control" id="email" placeholder="Enter email">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Password">
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-dark">Login</button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer " style="background-image: linear-gradient(to left , #FFB30E , #F17228);">
                        <div class="d-flex justify-content-between">
                            <a href="forget.html" class="text-decoration-none text-light fw-bold">Forgot password?</a>
                            <a href="register.html" target="_blank" class="text-decoration-none text-light fw-bold">Register</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
<!-- End Section login -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
